name = "Structure Prediction (ESMFold)"
description = "Predict 3D structure using ESMFold"
inputs = ["ingested_sequences.csv"]
outputs = ["outputs/prediction_results/*.pdb"]

[container]
# Using custom ESMFold image
image = "esmfold:latest"

[scripts]
pre = "pre_run.sh"
run = "run.sh"
post = "post_run.sh"

[params.prediction_config]
type = "string"
default = '{"limit": 10}'
hint = "Number of sequences to process for testing (0 means all sequences)."


