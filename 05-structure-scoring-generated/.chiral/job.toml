name = "Structure Scoring (Generated)"
description = "Predicts structures and scores 50 DPO-generated sequences using cached ESMFold. Outputs scored_generated.csv for visualization."
inputs = ["optimized_sequences.csv"]
outputs = ["outputs/scored_generated.csv", "outputs/generated_pdbs/"]

[container]
image = "esmfold-gen:test"

[scripts]
pre = "pre_run.sh"
run = "run.sh"

[params.scoring_config]
type = "string"
default = '''
{
    "target_organism": "E_coli",
    "anionic_fraction": 0.25,
    "hydrophobic_moment_weight": 5.0,
    "cyclicity_penalty_threshold": 4.5
}
'''
hint = "Must match Node 03 scoring config for comparable scores."